# =============================================================================
# REGRAS DO HEALTH SCORE — ReviCX
# Edite este arquivo para ajustar criterios. Nao precisa mexer em codigo.
# =============================================================================

version: "1.1"

# Score maximo: 30 pts (6 criterios x 5 pts cada)
# ROI removido temporariamente — dados desatualizados na fonte

# --- Criterio 1: Recencia de Campanha ---
recency:
  description: "Data da ultima campanha enviada"
  max_points: 5
  rules:
    - condition: "days_since_last_campaign <= 7"
      points: 5
      label: "Ativa (ultimos 7 dias)"
    - condition: "days_since_last_campaign <= 20"
      points: 3
      label: "Moderada (8-20 dias)"
    - condition: "days_since_last_campaign > 20 OR no_campaigns"
      points: 0
      label: "Inativa (>20 dias)"

# --- Criterio 2: Automacoes Ativas ---
automations:
  description: "Quantidade de automacoes ativas"
  max_points: 5
  rules:
    - condition: "active_automations >= 3"
      points: 5
      label: "Completo (3+)"
    - condition: "active_automations >= 1"
      points: 3
      label: "Basico (1-2)"
    - condition: "active_automations == 0"
      points: 0
      label: "Nenhuma"

# --- Criterio 3: Integracoes Ativas ---
# Recalibrado: base real mostra max 2 integracoes na maioria dos clientes (nenhum tem 4+)
integrations:
  description: "Quantidade de integracoes ativas (e-commerce / ERP)"
  max_points: 5
  rules:
    - condition: "active_integrations >= 2"
      points: 5
      label: "Multi-integracao (2+)"
    - condition: "active_integrations == 1"
      points: 3
      label: "Basico (1)"
    - condition: "active_integrations == 0"
      points: 0
      label: "Nenhuma"

# --- Criterio 4: Utilizacao de Atendimento ---
chat_usage:
  description: "Uso do modulo de atendimento (chat)"
  max_points: 5
  rules:
    - condition: "has_human_agent AND (has_chat_flow OR has_ai)"
      points: 5
      label: "Avancado/Hibrido"
    - condition: "has_human_agent OR has_chat_flow"
      points: 4
      label: "Essencial"
    - condition: "no_chat_usage"
      points: 0
      label: "Nao utiliza"

# --- Criterio 5: Volume de Mensagens ---
message_volume:
  description: "Volume e tendencia de mensagens enviadas"
  max_points: 5
  rules:
    - condition: "volume_trend == 'growing' OR plan_usage_pct >= 80"
      points: 5
      label: "Alto/Crescente"
    - condition: "volume_trend == 'stable'"
      points: 3
      label: "Estavel"
    - condition: "volume_trend == 'declining' OR plan_usage_pct < 20"
      points: 0
      label: "Queda/Irrelevante"

# --- Criterio 6: Cobertura da Base ---
# Novo criterio: % da base de clientes impactada no mes
base_coverage:
  description: "Percentual da base de clientes contactada no mes"
  max_points: 5
  field: "total_impacted_customers_this_month / total_customers"
  rules:
    - condition: "coverage_pct >= 15"
      points: 5
      label: "Alta cobertura (>=15%)"
    - condition: "coverage_pct >= 5"
      points: 3
      label: "Moderada (5-14%)"
    - condition: "coverage_pct < 5 OR no_customers"
      points: 0
      label: "Baixa (<5%)"

# --- Classificacao Final ---
# Score maximo: 30 pts | Calibrado com base na distribuicao real (abr/2026)
classification:
  green:
    label: "Campeao"
    emoji: "🟢"
    min_score: 19
    max_score: 30
    description: "Power User. Extrai o maximo da ferramenta."
  yellow:
    label: "Alerta"
    emoji: "🟡"
    min_score: 11
    max_score: 18
    description: "Operacional. Estavel mas subutilizado."
  red:
    label: "Em Risco"
    emoji: "🔴"
    min_score: 4
    max_score: 10
    description: "Desconectado. Acao de resgate imediata."
  inactive:
    label: "Inativo"
    emoji: "⚫"
    min_score: 0
    max_score: 3
    description: "Sem atividade relevante. Verificar status do onboarding."

# --- Regras de Alerta ---
alerts:
  - id: "score_dropped_to_red"
    name: "Score caiu para Vermelho"
    condition: "health_status == 'red' AND previous_status != 'red'"
    severity: "critical"
    action: "Criar task urgente para o CSM"

  - id: "no_campaign_14d"
    name: "Sem campanha ha 14+ dias"
    condition: "days_since_last_campaign >= 14"
    severity: "warning"
    action: "Notificar CSM para agendar consultoria"

  - id: "roi_dropped_below_1"
    name: "ROI caiu abaixo de 1x"
    condition: "campaign_roi < 1 AND previous_roi >= 1"
    severity: "warning"
    action: "Agendar analise de campanha com cliente"

  - id: "renewal_90d"
    name: "Renovacao em 90 dias"
    condition: "days_to_renewal <= 90"
    severity: "info"
    action: "Iniciar processo de reaplicacao SPICE"

  - id: "renewal_30d_red"
    name: "Renovacao em 30 dias + Score Vermelho"
    condition: "days_to_renewal <= 30 AND health_status == 'red'"
    severity: "critical"
    action: "Escalar para gestao — risco alto de churn"

  - id: "volume_drop_30pct"
    name: "Queda de volume >30%"
    condition: "messages_mom_change <= -30"
    severity: "warning"
    action: "Investigar causa e agendar call"

  - id: "low_base_coverage"
    name: "Cobertura da base abaixo de 5%"
    condition: "coverage_pct < 5 AND health_status != 'inactive'"
    severity: "warning"
    action: "Orientar cliente a ampliar uso de campanhas e automacoes"

  - id: "inactive_client"
    name: "Cliente sem atividade (Inativo)"
    condition: "health_status == 'inactive' AND days_to_renewal <= 60"
    severity: "critical"
    action: "Acionar CSM para diagnostico — risco de churn silencioso"

  - id: "upsell_opportunity"
    name: "Oportunidade de upsell"
    condition: "health_status == 'green' AND plan_usage_pct >= 90"
    severity: "info"
    action: "Qualificar como SQL de expansao"
